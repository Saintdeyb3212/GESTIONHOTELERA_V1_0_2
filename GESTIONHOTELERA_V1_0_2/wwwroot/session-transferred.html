<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sesion trasladada</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, Helvetica, sans-serif;
            color: #171717;
            background: linear-gradient(135deg, #fffdf5, #f5dc8b);
        }
        main {
            width: min(560px, 100%);
            padding: 34px;
            border: 1px solid #d4b452;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 18px 50px rgba(0, 0, 0, 0.16);
            text-align: center;
        }
        .mark {
            width: 68px;
            height: 68px;
            display: grid;
            place-items: center;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: #d6af39;
            color: #111111;
            font-size: 25px;
            font-weight: 800;
        }
        h1 { margin: 0 0 12px; font-size: 1.65rem; }
        p { margin: 0 0 22px; line-height: 1.55; }
        button, a {
            display: inline-block;
            padding: 11px 18px;
            border: 0;
            border-radius: 10px;
            background: #111111;
            color: #ffffff;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }
        .hint { margin-top: 16px; color: #5b5b5b; font-size: 0.92rem; }
    </style>
</head>
<body>
    <main>
        <div class="mark">HW</div>
        <h1>La sesion continua en otra pestana</h1>
        <p>
            Para evitar varias pestanas activas, el sistema traslado la sesion a la pestana mas reciente.
            Esta pestana ya no permite navegar por los modulos.
        </p>
        <button type="button" onclick="window.close()">Cerrar esta pestana</button>
        <p class="hint">Si el navegador no la cierra automaticamente, use Ctrl + W.</p>
    </main>
</body>
</html>
